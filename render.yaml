services:
  - type: web
    name: aerogauge-api
    runtime: python
    rootDir: Intelligence Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DEVICE_TOKEN
        generateValue: true
      - key: TELEMETRY_SECRET
        generateValue: true
      - key: DEFAULT_ORGANISATION
        value: Aero-Mesh Operations
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
